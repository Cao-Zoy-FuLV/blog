name:  部署

on:
  # 当推送到默认分支时触发
  push:
    branches: ["master", "main"]
  # 允许在 Actions 标签页手动触发此工作流
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限以允许部署到 GitHub Pages
permissions:
  contents: read      # 读取仓库内容
  pages: write        # 写入 GitHub Pages
  id-token: write     # 用于 OIDC 认证

# 并发控制配置
concurrency:
  group: "pages"              # 将部署任务分组
  cancel-in-progress: false   # 取消进行中的部署，避免冲突

jobs:
  # 构建任务
  build:
    runs-on: ubuntu-latest    # 运行环境
    environment:
      name: blog
      url: ${{ steps.blog.outputs.github_pages_url }}  # 部署后的 URL
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '24'  
          cache: 'npm'
      
      - name: 安装依赖
        run: npm ci
      
      - name: 部署到 GitHub Pages
        uses: skywarth/vite-github-pages-deployer@master
        id: blog
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
